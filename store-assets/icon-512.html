<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 512px; height: 512px; overflow: hidden; background: #fff; }

  .icon {
    width: 512px;
    height: 512px;
    background: linear-gradient(145deg, #7C6FF0 0%, #9B8FF5 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    gap: 0;
  }

  /* Soft inner glow ring */
  .icon::before {
    content: '';
    position: absolute;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }

  /* House shape */
  .house {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Roof triangle via border trick */
  .roof {
    width: 0;
    height: 0;
    border-left:  95px solid transparent;
    border-right: 95px solid transparent;
    border-bottom: 82px solid rgba(255,255,255,0.95);
    margin-bottom: -2px;
    filter: drop-shadow(0 -4px 12px rgba(0,0,0,0.12));
  }

  /* House body */
  .body {
    width: 160px;
    height: 120px;
    background: rgba(255,255,255,0.95);
    border-radius: 0 0 14px 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Checkmark inside the house */
  .check {
    font-size: 72px;
    color: #7C6FF0;
    font-weight: 900;
    line-height: 1;
    margin-top: -6px;
    font-family: system-ui, sans-serif;
  }

  /* App name below house */
  .name {
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 58px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -1px;
    margin-top: 22px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
</style>
</head>
<body>
  <div class="icon">
    <div class="house">
      <div class="roof"></div>
      <div class="body">
        <span class="check">✓</span>
      </div>
    </div>
    <div class="name">doable</div>
  </div>
</body>
</html>
